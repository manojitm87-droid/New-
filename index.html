<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Melodify · Music</title>
    <link rel="icon" type="image/png" href="https://cdn.jsdelivr.net/gh/iloveyoujustyou13-debug/melodify--music@main/Ff_Arpon_cover.png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet" />
    <!-- সিএসএস ফাইল লিঙ্ক -->
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <!-- ===== HEADER ===== -->
    <header class="header" id="appHeader">
        <a href="#" class="header-brand">
            <img src="https://cdn.jsdelivr.net/gh/iloveyoujustyou13-debug/melodify--music@main/Ff_Arpon_cover.png" alt="Melodify" />
            <span class="brand-text">Melodify</span>
        </a>

        <div class="header-controls">
            <div class="search-filter">
                <div class="search-wrapper">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" id="searchInput" placeholder="Search songs, artists..." autocomplete="off" />
                    <div class="autocomplete-dropdown" id="autocompleteDropdown"></div>
                </div>
                <select id="categoryFilter">
                    <option value="all">All</option>
                </select>
            </div>
            <div class="sort-wrapper">
                <select id="sortSelect">
                    <option value="recent">Recent</option>
                    <option value="title">Title A–Z</option>
                    <option value="artist">Artist A–Z</option>
                    <option value="likes">Most Liked</option>
                    <option value="views">Most Viewed</option>
                </select>
            </div>
            <button class="favorites-toggle" id="favoritesToggle" title="Show only liked songs">
                <i class="fas fa-heart"></i>
                <span class="badge" id="favCount">0</span>
            </button>
        </div>

        <div class="header-actions">
            <button class="btn-icon theme-toggle" id="themeToggle" title="Toggle theme"><i class="fas fa-moon"></i></button>
            <button class="btn btn-sm" id="playlistToggleBtn"><i class="fas fa-heart"></i> Playlists</button>
            <button class="btn btn-sm" id="adminToggleBtn"><i class="fas fa-user-shield"></i> Admin</button>
            
            <div class="user-profile" id="userProfile" style="display:none;">
                <span class="avatar-placeholder" id="userAvatarPlaceholder">U</span>
                <img class="avatar" id="userAvatarImg" style="display:none;" alt="avatar" />
                <span class="user-name" id="userDisplayName">User</span>
                <span class="dropdown-arrow"><i class="fas fa-chevron-down"></i></span>
                <div class="user-dropdown" id="userDropdown">
                    <button class="dropdown-item" id="dropdownProfile"><i class="fas fa-user"></i> Profile</button>
                    <button class="dropdown-item" id="dropdownPlaylists"><i class="fas fa-heart"></i> My Playlists</button>
                    <div class="dropdown-divider"></div>
                    <button class="dropdown-item logout-item" id="dropdownLogout"><i class="fas fa-sign-out-alt"></i> Logout</button>
                </div>
            </div>
            <button class="btn btn-sm btn-primary" id="authBtn"><i class="fas fa-user-plus"></i> Sign Up</button>
            <button class="btn btn-sm" id="shortcutsToggleBtn" title="Keyboard shortcuts (?)"><i class="fas fa-keyboard"></i></button>
        </div>
    </header>

    <!-- ===== MAIN ===== -->
    <main class="container">

        <!-- ===== RECENTLY PLAYED ===== -->
        <div id="recentlyPlayedSection" class="recently-played-section">
            <div class="rec-header">
                <div class="rec-left">
                    <i class="fas fa-clock-rotate-left"></i>
                    <h2>Recently Played</h2>
                    <span class="rec-badge">last 20</span>
                </div>
            </div>
            <div id="recentGridContainer">
                <div id="recentGrid" class="recent-grid"></div>
                <div id="recentEmpty" class="recent-empty">
                    <i class="fas fa-headphones"></i>
                    <p>Start listening to see your recently played songs here.</p>
                </div>
            </div>
        </div>

        <!-- ===== RECOMMENDATIONS ===== -->
        <div id="recommendationsSection" class="recommendations-section">
            <div class="rec-header">
                <div class="rec-left">
                    <i class="fas fa-fire"></i>
                    <h2>Made For You</h2>
                    <span class="rec-badge">recommended</span>
                </div>
                <button class="clear-history-btn" id="clearHistoryBtn" title="Reset listening history">
                    <i class="fas fa-undo-alt"></i> Reset
                </button>
            </div>
            <div class="rec-sub" id="recSub">We analyse your favourites to suggest songs you'll love.</div>
            <div id="recGridContainer">
                <div id="recGrid" class="rec-grid"></div>
                <div id="recEmpty" class="rec-empty hidden">
                    <i class="fas fa-headphones"></i>
                    <p>Start listening to get personalised recommendations!</p>
                </div>
            </div>
        </div>

        <!-- ===== SONG GRID ===== -->
        <div id="songGridContainer">
            <div class="song-grid" id="songGrid"></div>
            <div id="loadingSpinner" class="spinner"></div>
            <div id="emptyState" class="empty-state hidden">
                <i class="fas fa-music"></i>
                <h3>No songs found</h3>
                <p>Try adjusting your search or filter.</p>
            </div>
        </div>

    </main>

</body>
</html>
